server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Permite uploads de hasta 30 MB (el backend acepta 25 MB; dejamos margen
    # para el overhead del multipart). Sin esto, nginx corta a 1 MB y devuelve 413.
    client_max_body_size 30M;

    # DNS resolver de Docker (127.0.0.11) — necesario para resolver hostnames de la red
    # interna en runtime y no fallar al iniciar nginx si el upstream aún no está listo.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Static assets — long cache
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy /api/* al backend Node (red interna Docker)
    # Variable + resolver = DNS lookup en cada request, no al boot
    location /api/ {
        set $backend "naves_backend";
        proxy_pass http://$backend:3000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        # 120s para que uploads grandes (anteproyecto/proyecto-final) tengan
        # tiempo de subir al backend y de allí a Supabase Storage. Antes era 30s
        # y cortaba subidas medianas/grandes en conexiones lentas.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        # Desactiva el buffering del request para que nginx no descargue todo
        # el archivo a disco antes de mandárselo al backend (más rápido y
        # evita problemas de espacio).
        proxy_request_buffering off;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
